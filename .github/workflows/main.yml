name: Doge 4H Bot
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Paketleri Yukle
        run: pip install pandas requests
      - name: Botu Calistir
        run: python quant.py
