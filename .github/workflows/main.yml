name: Doge 4H Bot

on:
  schedule:
    # Her 4 saatte bir, saat başından 10 dakika sonra çalışır.
    # (03:10, 07:10, 11:10, 15:10, 19:10, 23:10)
    # Bu ayar GitHub sunucularındaki yoğunluktan kaçmamızı sağlar.
    - cron: '10 */4 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: Python Ayarla
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Botu Calistir
        run: python quant.py
